name: Build and Deploy Chat App

on:
  push:
    branches:
      - main # Triggers the workflow when code is pushed to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Performs a clean install of project packages

      - name: Build Project
        run: npm run build

      # Optional Deployment Step (Uncomment if deploying to GitHub Pages)
